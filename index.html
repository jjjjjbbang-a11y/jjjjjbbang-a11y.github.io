<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방준배 과장 AI 비서</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #f4f7f6; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        .api-input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        #recordBtn { background-color: #e74c3c; }
        #stopBtn { background-color: #7f8c8d; }
        #analyzeBtn { background-color: #8e44ad; }
        #resultBox { margin-top: 20px; padding: 15px; background: #fff; border: 1px solid #ddd; border-radius: 5px; white-space: pre-wrap; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>방준배 과장 (google Gemini)</h2>
        <input type="password" id="apiKey" class="api-input" placeholder="여기에 복사한 API 키를 붙여넣으세요">
        <button id="recordBtn">🔴 녹음 시작</button>
        <button id="stopBtn" disabled>⬛ 녹음 중지</button>
        <audio id="audioPlayback" controls style="width:100%; margin:10px 0; display:none;"></audio>
        <button id="analyzeBtn" style="display:none;">🧠 회의 내용 분석하기</button>
        <div id="resultBox"></div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let currentBlob;

        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const audioPlayback = document.getElementById('audioPlayback');
        const resultBox = document.getElementById('resultBox');

        recordBtn.addEventListener('click', async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                currentBlob = new Blob(audioChunks, { type: 'audio/mp4' });
                audioPlayback.src = URL.createObjectURL(currentBlob);
                audioPlayback.style.display = "block";
                analyzeBtn.style.display = "block";
                stream.getTracks().forEach(t => t.stop());
            };
            mediaRecorder.start();
            recordBtn.disabled = true;
            stopBtn.disabled = false;
        });

        stopBtn.addEventListener('click', () => { mediaRecorder.stop(); recordBtn.disabled = false; stopBtn.disabled = true; });

        analyzeBtn.addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim(); // 공백 자동 제거
            if (!apiKey) { alert("API 키를 입력하세요!"); return; }
            
            resultBox.style.display = "block";
            resultBox.innerText = "분석 중입니다... 잠시만 기다려 주세요.";
            
            const reader = new FileReader();
            reader.readAsDataURL(currentBlob);
            reader.onloadend = async () => {
                const base64Audio = reader.result.split(',')[1];
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "이 회의를 듣고 1. 대본 2. 요약 3. 감정분석을 해줘." }, { inlineData: { mimeType: "audio/mp4", data: base64Audio } }] }]
                        })
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    resultBox.innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, "<br>");
                } catch (e) {
                    resultBox.innerText = "오류 발생: " + e.message;
                }
            };
        });
    </script>
</body>
</html>
