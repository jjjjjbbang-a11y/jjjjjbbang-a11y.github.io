<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 회의 분석 앱 v1.6 (최종)</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-top: 40px; 
            background-color: #f5f7f9; 
            padding-bottom: 50px;
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 320px; 
        }
        .version-badge {
            background-color: #16a085; /* 최종 완성은 민트색으로! */
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 15px;
            display: inline-block;
        }
        button { 
            padding: 10px 20px; 
            margin: 10px 5px; 
            border: none; 
            border-radius: 6px; 
            font-size: 15px; 
            cursor: pointer; 
            transition: background-color 0.2s; 
        }
        #recordBtn { background-color: #e74c3c; color: white; }
        #recordBtn:disabled { background-color: #f1948a; cursor: not-allowed; }
        
        #stopBtn { background-color: #34495e; color: white; }
        #stopBtn:disabled { background-color: #85929e; cursor: not-allowed; }
        
        #audioPlayback { margin-top: 20px; width: 100%; }
        
        #status { 
            margin-top: 15px; 
            font-weight: bold; 
            color: #2c3e50; 
            font-size: 14px; 
            word-break: keep-all; 
        }

        #analyzeBtn { background-color: #27ae60; color: white; width: 100%; margin-top: 20px; display: none; }
        #analyzeBtn:disabled { background-color: #a9dfbf; cursor: not-allowed; }
        
        #emotionBtn { background-color: #d35400; color: white; width: 100%; margin-top: 15px; display: none; }
        #emotionBtn:disabled { background-color: #edbb99; cursor: not-allowed; }
        .emotion-box { background-color: #fdf2e9; border-color: #edbb99; }

        #summarizeBtn { background-color: #8e44ad; color: white; width: 100%; margin-top: 15px; display: none; }
        #summarizeBtn:disabled { background-color: #d2b4de; cursor: not-allowed; }

        /* 5단계 추가: 결과 다운로드 버튼 */
        #downloadBtn { 
            background-color: #2980b9; 
            color: white; 
            width: 100%; 
            margin-top: 25px; 
            display: none; 
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(41, 128, 185, 0.3);
        }
        #downloadBtn:hover { background-color: #2471a3; }

        .data-box { 
            margin-top: 20px; 
            padding: 15px; 
            background-color: #fdfefe; 
            border: 1px solid #d5dbdb; 
            border-radius: 8px; 
            text-align: left; 
            font-size: 14px; 
            line-height: 1.6; 
            display: none;
        }
        .transcript-box { max-height: 200px; overflow-y: auto; }
        .summary-box { background-color: #f5eef8; border-color: #d7bde2; } 
        
        .speaker-A { color: #2980b9; font-weight: bold; }
        .speaker-B { color: #27ae60; font-weight: bold; }
        .keyword { font-weight: bold; color: #d35400; }
    </style>
</head>
<body>

    <div class="container">
        <div class="version-badge">🏆 버전 1.6 (최종 완성본)</div>
        <h2>나만의 AI 회의 비서</h2>
        
        <button id="recordBtn">🔴 녹음 시작</button>
        <button id="stopBtn" disabled>⬛ 녹음 중지</button>
        
        <div id="status">회의를 녹음해 보세요.</div>
        
        <audio id="audioPlayback" controls></audio>

        <button id="analyzeBtn">✨ AI 텍스트 변환 (STT)</button>
        <div id="transcriptBox" class="data-box transcript-box"></div>

        <button id="emotionBtn">🎧 목소리 억양 및 톤 분석</button>
        <div id="emotionBox" class="data-box emotion-box"></div>

        <button id="summarizeBtn">📝 회의 요약 및 맥락 분석</button>
        <div id="summaryBox" class="data-box summary-box"></div>

        <button id="downloadBtn">💾 회의 기록 다운로드 (.txt)</button>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const audioPlayback = document.getElementById('audioPlayback');
        const statusText = document.getElementById('status');
        
        const analyzeBtn = document.getElementById('analyzeBtn');
        const transcriptBox = document.getElementById('transcriptBox');
        
        const emotionBtn = document.getElementById('emotionBtn');
        const emotionBox = document.getElementById('emotionBox');

        const summarizeBtn = document.getElementById('summarizeBtn');
        const summaryBox = document.getElementById('summaryBox');

        const downloadBtn = document.getElementById('downloadBtn');

        let mediaRecorder;
        let audioChunks = [];
        let currentAudioBlob = null;

        recordBtn.addEventListener('click', async () => {
            try {
                statusText.innerText = "마이크 권한 요청 중...";
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = []; 

                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const mimeType = mediaRecorder.mimeType ? mediaRecorder.mimeType : 'audio/mp4';
                    currentAudioBlob = new Blob(audioChunks, { type: mimeType });
                    audioPlayback.src = URL.createObjectURL(currentAudioBlob);
                    
                    statusText.innerText = "녹음 완료! 분석을 시작하세요.";
                    analyzeBtn.style.display = "block";
                    analyzeBtn.disabled = false;
                    
                    // 화면 초기화
                    transcriptBox.style.display = "none";
                    emotionBtn.style.display = "none";
                    emotionBox.style.display = "none";
                    summarizeBtn.style.display = "none";
                    summaryBox.style.display = "none";
                    downloadBtn.style.display = "none"; // 다운로드 버튼 숨기기
                    
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                statusText.innerText = "녹음 중입니다...";
                statusText.style.color = "#e74c3c";
                recordBtn.disabled = true;
                stopBtn.disabled = false;
                analyzeBtn.style.display = "none";

            } catch (error) {
                console.error("마이크 오류:", error);
                statusText.innerText = "마이크 권한을 허용해 주세요.";
            }
        });

        stopBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                statusText.style.color = "#2c3e50";
                recordBtn.disabled = false;
                stopBtn.disabled = true;
            }
        });

        analyzeBtn.addEventListener('click', () => {
            if (!currentAudioBlob) return;
            statusText.innerText = "텍스트 변환 중... ⏳";
            analyzeBtn.disabled = true;
            transcriptBox.style.display = "block";
            transcriptBox.innerHTML = "<span style='color:#7f8c8d;'>음성 인식 중... (약 2초)</span>";

            setTimeout(() => {
                transcriptBox.innerHTML = `
                    <p><span class="speaker-A">화자 A (팀장):</span> 이번 앱 개발, 어디까지 진행됐나요?</p>
                    <p><span class="speaker-B">화자 B (개발자):</span> 방금 아이폰 사파리 오류를 잡고 최종 단계를 완성했습니다.</p>
                    <p><span class="speaker-A">화자 A (팀장):</span> 수고하셨습니다. 회의록 다운로드까지 잘 되는지 확인해 주세요.</p>
                `;
                statusText.innerText = "✨ 변환 완료! 분석을 진행해 보세요.";
                
                emotionBtn.style.display = "block";
                emotionBtn.disabled = false;
                summarizeBtn.style.display = "block";
                summarizeBtn.disabled = false;
                
                // 텍스트 변환이 완료되면 다운로드 버튼도 활성화
                downloadBtn.style.display = "block";
            }, 2000);
        });

        emotionBtn.addEventListener('click', () => {
            statusText.innerText = "음성 분석 중... 📊";
            emotionBtn.disabled = true;
            emotionBox.style.display = "block";
            emotionBox.innerHTML = "<span style='color:#7f8c8d;'>AI 오디오 분석 중...</span>";

            setTimeout(() => {
                emotionBox.innerHTML = `
                    <h3 style="margin-top:0; color:#d35400;">📊 음성 파형 분석 결과</h3>
                    <p>🔊 화자 A: 피치(Pitch) 상승. [기대감 / 만족]</p>
                    <p>🔉 화자 B: 안정적인 주파수. [차분함 / 성취감]</p>
                `;
                statusText.innerText = "🎧 음성 톤 분석 완료!";
                emotionBtn.disabled = false;
            }, 2500);
        });

        summarizeBtn.addEventListener('click', () => {
            statusText.innerText = "맥락 요약 중... 🧠";
            summarizeBtn.disabled = true;
            summaryBox.style.display = "block";
            summaryBox.innerHTML = "<span style='color:#7f8c8d;'>LLM 요약 중...</span>";

            setTimeout(() => {
                summaryBox.innerHTML = `
                    <h3 style="margin-top:0; color:#2c3e50;">📌 회의 요약 노트</h3>
                    <ul style="padding-left: 20px; margin-bottom: 0;">
                        <li><b>주제:</b> 최종 앱 개발 완료 보고</li>
                        <li><b>현황:</b> 5단계 완성 및 오류 수정 완료</li>
                        <li><b>결론:</b> 회의록 다운로드 기능 테스트 진행</li>
                    </ul>
                `;
                statusText.innerText = "🧠 AI 회의 분석 완료!";
                summarizeBtn.disabled = false;
            }, 2000);
        });

        // 5단계: 화면에 있는 내용을 텍스트 파일로 만들어서 다운로드하는 기능
        downloadBtn.addEventListener('click', () => {
            let resultText = "====== AI 회의 비서 기록 ======\n\n";
            
            // 텍스트 대본 추출 (HTML 태그 제거하고 순수 텍스트만 가져오기)
            if (transcriptBox.style.display === "block") {
                resultText += "[회의 대본]\n";
                resultText += transcriptBox.innerText + "\n\n";
            }
            
            // 감정 분석 결과 추출
            if (emotionBox.style.display === "block") {
                resultText += "[음성 톤 분석 결과]\n";
                resultText += emotionBox.innerText + "\n\n";
            }
            
            // 요약 추출
            if (summaryBox.style.display === "block") {
                resultText += "[회의 요약 노트]\n";
                resultText += summaryBox.innerText + "\n\n";
            }
            
            // 파일 생성 및 다운로드 처리
            const blob = new Blob([resultText], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            
            // 오늘 날짜로 파일명 만들기 (예: AI_회의기록_20231025.txt)
            const today = new Date();
            const dateStr = today.getFullYear() + String(today.getMonth() + 1).padStart(2, '0') + String(today.getDate()).padStart(2, '0');
            link.download = `AI_회의기록_${dateStr}.txt`;
            
            // 가상의 링크를 클릭하게 만들어서 다운로드 실행
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            statusText.innerText = "💾 회의 기록이 다운로드되었습니다!";
        });
    </script>
</body>
</html>
