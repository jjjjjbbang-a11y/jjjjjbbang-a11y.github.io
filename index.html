<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 회의 분석 앱 v2.1</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 30px; background-color: #f5f7f9; padding-bottom: 50px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        .version-badge { background-color: #27ae60; color: white; padding: 4px 10px; border-radius: 12px; font-size: 13px; font-weight: bold; margin-bottom: 15px; display: inline-block; }
        
        .api-key-box { margin-bottom: 15px; text-align: left; background-color: #ebf5fb; padding: 10px; border-radius: 8px; }
        .api-key-box label { font-size: 12px; font-weight: bold; color: #2980b9; }
        .api-key-box input { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #a9cce3; border-radius: 4px; box-sizing: border-box; }

        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; transition: background-color 0.2s; width: 100%; }
        #recordBtn { background-color: #e74c3c; color: white; }
        #recordBtn:disabled { background-color: #f1948a; cursor: not-allowed; }
        #stopBtn { background-color: #34495e; color: white; }
        #stopBtn:disabled { background-color: #85929e; cursor: not-allowed; }
        
        #audioPlayback { margin-top: 15px; width: 100%; display: none; }
        #status { margin-top: 15px; font-weight: bold; color: #2c3e50; font-size: 14px; word-break: keep-all; }

        #aiActionBtn { background-color: #8e44ad; color: white; margin-top: 15px; display: none; }
        #aiActionBtn:disabled { background-color: #d2b4de; cursor: not-allowed; }

        .data-box { margin-top: 20px; padding: 15px; background-color: #f5eef8; border: 1px solid #d7bde2; border-radius: 8px; text-align: left; font-size: 14px; line-height: 1.6; display: none; overflow-y: auto; max-height: 400px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="version-badge">🚀 버전 2.1 (오디오 직접 분석)</div>
        
        <h2 style="margin-bottom: 5px; color:#2c3e50;">방준배 과장 (google Gemini)</h2>
        <div style="font-size: 14px; color: #7f8c8d; margin-bottom: 20px;">AS 업무 보고 비서</div>
        
        <div class="api-key-box">
            <label for="apiKey">🔑 Gemini API 키 입력 (공백 없이)</label>
            <input type="password" id="apiKey" placeholder="AIzaSy...">
        </div>
        
        <button id="recordBtn">🔴 회의 녹음 시작</button>
        <button id="stopBtn" disabled>⬛ 녹음 중지</button>
        
        <div id="status">대기 중...</div>
        <audio id="audioPlayback" controls></audio>

        <button id="aiActionBtn">🧠 오디오 전송 및 통합 분석 (STT+요약)</button>
        
        <div id="aiResultBox" class="data-box"></div>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const audioPlayback = document.getElementById('audioPlayback');
        const statusText = document.getElementById('status');
        const aiActionBtn = document.getElementById('aiActionBtn');
        const aiResultBox = document.getElementById('aiResultBox');
        const apiKeyInput = document.getElementById('apiKey');

        let mediaRecorder;
        let audioChunks = [];
        let currentAudioBlob = null;

        // 1. 녹음 기능 (v1.6 방식)
        recordBtn.addEventListener('click', async () => {
            if (!apiKeyInput.value.trim()) {
                alert("API 키를 먼저 입력해 주세요.");
                return;
            }
            try {
                statusText.innerText = "마이크 권한 요청 중...";
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = []; 

                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    // 녹음된 파일을 Blob으로 저장
                    const mimeType = mediaRecorder.mimeType ? mediaRecorder.mimeType : 'audio/mp4';
                    currentAudioBlob = new Blob(audioChunks, { type: mimeType });
                    
                    audioPlayback.src = URL.createObjectURL(currentAudioBlob);
                    audioPlayback.style.display = "block";
                    
                    statusText.innerText = "녹음 완료! Gemini에게 전송해 보세요.";
                    aiActionBtn.style.display = "block";
                    aiActionBtn.disabled = false;
                    aiResultBox.style.display = "none";
                    
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                statusText.innerText = "녹음 중입니다... 🎙️";
                statusText.style.color = "#e74c3c";
                recordBtn.disabled = true;
                stopBtn.disabled = false;
                aiActionBtn.style.display = "none";
                audioPlayback.style.display = "none";

            } catch (error) {
                console.error("마이크 오류:", error);
                statusText.innerText = "마이크를 사용할 수 없습니다.";
            }
        });

        stopBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                statusText.style.color = "#2c3e50";
                recordBtn.disabled = false;
                stopBtn.disabled = true;
            }
        });

        // Blob을 Base64 문자열로 변환하는 도구 함수
        function blobToBase64(blob) {
            return new Promise((resolve, _) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(blob);
            });
        }

        // 2. 오디오를 Gemini에게 보내서 한 번에 분석받기
        aiActionBtn.addEventListener('click', async () => {
            // 공백을 완벽히 제거하여 404 에러 방지
            const apiKey = apiKeyInput.value.replace(/\s+/g, ''); 
            if (!currentAudioBlob) return;

            statusText.innerText = "오디오 전송 및 AI 분석 중... (조금 오래 걸립니다) ⏳";
            aiActionBtn.disabled = true;
            aiResultBox.style.display = "block";
            aiResultBox.innerHTML = "<span style='color:#7f8c8d; text-align:center; display:block;'>Gemini가 소리를 듣고 분석하고 있습니다.<br>오디오 길이에 따라 10초 이상 걸릴 수 있습니다.</span>";

            try {
                // 오디오 파일을 데이터(Base64)로 변환
                const base64Audio = await blobToBase64(currentAudioBlob);
                
                // 마임타입 정리 (ex: audio/mp4)
                let mimeType = currentAudioBlob.type.split(';')[0];
                if (!mimeType) mimeType = 'audio/webm';

                // Gemini에게 내릴 강력한 프롬프트(명령)
                const promptText = `
첨부된 오디오 파일을 듣고 다음 세 가지 작업을 수행해 줘. HTML 태그(h3, p, ul, li, b 등)를 사용해서 시각적으로 깔끔하게 정리해 줘.

1. [대본 작성]: 오디오 내용의 텍스트 대본 (화자가 여러 명이면 A, B 등으로 분리 시도).
2. [회의 요약]: 대화의 핵심 내용을 3줄 요약.
3. [음성 감정 분석]: 목소리의 톤, 억양, 속도 등 물리적 소리를 바탕으로 한 말하는 사람의 감정 상태 (예: 차분함, 서두름, 확신에 참 등).
`;
                // API 통신
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: promptText },
                                {
                                    inlineData: {
                                        mimeType: mimeType,
                                        data: base64Audio
                                    }
                                }
                            ]
                        }]
                    })
                });

                if (!response.ok) {
                    throw new Error(`(에러 코드: ${response.status}) API 키가 잘못되었거나 할당량을 초과했습니다.`);
                }

                const data = await response.json();
                
                // 분석 결과 출력
                const resultHtml = data.candidates[0].content.parts[0].text;
                aiResultBox.innerHTML = resultHtml;
                statusText.innerText = "✨ 오디오 분석이 완벽하게 끝났습니다!";
                aiActionBtn.disabled = false;

            } catch (error) {
                console.error(error);
                aiResultBox.innerHTML = `<span style='color:#c0392b; font-weight:bold;'>오류 발생: ${error.message}</span>`;
                statusText.innerText = "분석 중 오류가 발생했습니다. API 키 공백을 확인해 주세요.";
                aiActionBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
