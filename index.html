<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 회의 분석 앱 v2.0 (Real AI)</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-top: 30px; 
            background-color: #f5f7f9; 
            padding-bottom: 50px;
        }
        .container { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 320px; 
        }
        .version-badge {
            background-color: #f1c40f; /* 진짜 AI는 금색으로! */
            color: #2c3e50;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 15px;
            display: inline-block;
        }
        
        /* API 키 입력칸 스타일 */
        .api-key-box {
            margin-bottom: 15px;
            text-align: left;
            background-color: #ebf5fb;
            padding: 10px;
            border-radius: 8px;
        }
        .api-key-box label { font-size: 12px; font-weight: bold; color: #2980b9; }
        .api-key-box input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #a9cce3;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button { 
            padding: 10px 20px; 
            margin: 5px; 
            border: none; 
            border-radius: 6px; 
            font-size: 15px; 
            cursor: pointer; 
            transition: background-color 0.2s; 
            width: 100%;
        }
        #recordBtn { background-color: #e74c3c; color: white; }
        #recordBtn:disabled { background-color: #f1948a; cursor: not-allowed; }
        
        #stopBtn { background-color: #34495e; color: white; }
        #stopBtn:disabled { background-color: #85929e; cursor: not-allowed; }
        
        #status { 
            margin-top: 15px; 
            font-weight: bold; 
            color: #2c3e50; 
            font-size: 14px; 
            word-break: keep-all; 
        }

        #aiActionBtn { background-color: #8e44ad; color: white; margin-top: 15px; display: none; }
        #aiActionBtn:disabled { background-color: #d2b4de; cursor: not-allowed; }

        .data-box { 
            margin-top: 20px; 
            padding: 15px; 
            background-color: #fdfefe; 
            border: 1px solid #d5dbdb; 
            border-radius: 8px; 
            text-align: left; 
            font-size: 14px; 
            line-height: 1.6; 
        }
        #transcriptBox { min-height: 50px; background-color: #f9ebea; border-color: #fadbd8; }
        #aiResultBox { display: none; background-color: #f5eef8; border-color: #d7bde2; } 
    </style>
</head>
<body>

    <div class="container">
        <div class="version-badge">🌟 버전 2.0 (실제 AI 연동)</div>
        <h2>AI 회의 비서</h2>
        
        <div class="api-key-box">
            <label for="apiKey">🔑 Gemini API 키 입력 (필수)</label>
            <input type="password" id="apiKey" placeholder="AIzaSy... 로 시작하는 키 붙여넣기">
        </div>
        
        <button id="recordBtn">🔴 녹음 및 실시간 텍스트 변환</button>
        <button id="stopBtn" disabled>⬛ 변환 중지</button>
        
        <div id="status">대기 중...</div>
        
        <div id="transcriptBox" class="data-box">
            <span style="color:#95a5a6;">(녹음을 시작하면 여기에 텍스트가 실시간으로 기록됩니다)</span>
        </div>

        <button id="aiActionBtn">🧠 Gemini AI 회의 요약 및 감정 분석</button>
        
        <div id="aiResultBox" class="data-box"></div>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('status');
        const transcriptBox = document.getElementById('transcriptBox');
        const aiActionBtn = document.getElementById('aiActionBtn');
        const aiResultBox = document.getElementById('aiResultBox');
        const apiKeyInput = document.getElementById('apiKey');

        // 브라우저 내장 음성 인식 기능 (무료 STT)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let finalTranscript = "";

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true; // 계속 듣기
            recognition.interimResults = true; // 중간 결과도 보여주기
            recognition.lang = 'ko-KR'; // 한국어 설정

            recognition.onresult = (event) => {
                let interimTranscript = "";
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + " ";
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                transcriptBox.innerHTML = "<strong>[기록 중]</strong><br>" + finalTranscript + "<i style='color:#7f8c8d;'>" + interimTranscript + "</i>";
            };

            recognition.onerror = (event) => {
                console.error("음성 인식 오류:", event.error);
                if (event.error === 'not-allowed') {
                    statusText.innerText = "마이크 권한을 허용해주세요!";
                }
            };
        } else {
            transcriptBox.innerHTML = "<span style='color:red;'>현재 브라우저에서는 실시간 음성 인식(STT)을 지원하지 않습니다. 사파리 최신 버전이나 크롬을 이용해 주세요.</span>";
            recordBtn.disabled = true;
        }

        // 녹음 시작
        recordBtn.addEventListener('click', () => {
            if (!apiKeyInput.value) {
                alert("먼저 위칸에 발급받으신 API 키를 붙여넣어 주세요!");
                return;
            }
            
            finalTranscript = "";
            transcriptBox.innerHTML = "";
            aiResultBox.style.display = "none";
            aiActionBtn.style.display = "none";
            
            try {
                recognition.start();
                statusText.innerText = "음성을 듣고 텍스트로 바꾸고 있습니다...";
                recordBtn.disabled = true;
                stopBtn.disabled = false;
            } catch(e) {
                console.error(e);
            }
        });

        // 녹음 중지
        stopBtn.addEventListener('click', () => {
            recognition.stop();
            statusText.innerText = "음성 기록이 완료되었습니다.";
            recordBtn.disabled = false;
            stopBtn.disabled = true;
            
            if (finalTranscript.trim().length > 0) {
                aiActionBtn.style.display = "block";
            } else {
                statusText.innerText = "녹음된 텍스트가 없습니다. 다시 시도해 주세요.";
            }
        });

        // Gemini AI 호출 (진짜 분석)
        aiActionBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                alert("API 키가 없습니다."); return;
            }

            statusText.innerText = "구글 Gemini AI가 분석 중입니다... 🧠⏳";
            aiActionBtn.disabled = true;
            aiResultBox.style.display = "block";
            aiResultBox.innerHTML = "<span style='color:#7f8c8d;'>데이터 전송 및 분석 대기 중... (3~5초 소요)</span>";

            // Gemini에게 전달할 명령(프롬프트) 작성
            const promptText = `
다음은 회의 녹음 기록입니다. 브라우저 자동 인식이라 띄어쓰기나 오타가 있을 수 있습니다.
이 텍스트를 바탕으로 다음 두 가지를 수행해 주세요:
1. [회의 요약]: 대화의 핵심 내용, 안건, 결론(또는 다음 할 일)을 깔끔하게 요약해 주세요.
2. [감정 및 맥락 분석]: 대화의 전반적인 분위기와 참가자들의 감정 상태(예: 차분함, 긍정적, 불만족 등)를 추론해 설명해 주세요.

[녹음 기록]:
${finalTranscript}
`;

            try {
                // Gemini API 서버로 요청 보내기 (REST API)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }]
                    })
                });

                if (!response.ok) {
                    throw new Error(`API 통신 에러 (${response.status}) - API 키가 틀렸거나 한도를 초과했습니다.`);
                }

                const data = await response.json();
                
                // 줄바꿈 문자를 HTML <br> 태그로 변경하여 예쁘게 출력
                const resultHtml = data.candidates[0].content.parts[0].text.replace(/\n/g, "<br>");
                
                aiResultBox.innerHTML = resultHtml;
                statusText.innerText = "✨ AI 분석이 완벽하게 끝났습니다!";
                aiActionBtn.disabled = false;

            } catch (error) {
                console.error(error);
                aiResultBox.innerHTML = `<span style='color:red;'>오류 발생: ${error.message}</span>`;
                statusText.innerText = "분석 중 오류가 발생했습니다.";
                aiActionBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
