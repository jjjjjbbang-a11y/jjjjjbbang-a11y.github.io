<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 회의 분석 앱 v1.3</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-top: 40px; 
            background-color: #f5f7f9; 
            padding-bottom: 50px;
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 320px; 
        }
        .version-badge {
            background-color: #3498db;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
            display: inline-block;
        }
        button { 
            padding: 10px 20px; 
            margin: 10px 5px; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px; 
            cursor: pointer; 
            transition: background-color 0.2s; 
        }
        #recordBtn { background-color: #e74c3c; color: white; }
        #recordBtn:disabled { background-color: #f1948a; cursor: not-allowed; }
        
        #stopBtn { background-color: #34495e; color: white; }
        #stopBtn:disabled { background-color: #85929e; cursor: not-allowed; }
        
        #audioPlayback { margin-top: 20px; width: 100%; }
        
        #status { 
            margin-top: 15px; 
            font-weight: bold; 
            color: #2c3e50; 
            font-size: 14px; 
            word-break: keep-all; 
        }

        #analyzeBtn { 
            background-color: #27ae60; 
            color: white; 
            width: 100%; 
            margin-top: 20px; 
            display: none;
        }
        #analyzeBtn:disabled { background-color: #a9dfbf; cursor: not-allowed; }
        
        .transcript-box { 
            margin-top: 20px; 
            padding: 15px; 
            background-color: #fdfefe; 
            border: 1px solid #d5dbdb; 
            border-radius: 8px; 
            text-align: left; 
            max-height: 250px; 
            overflow-y: auto; 
            font-size: 14px; 
            line-height: 1.6; 
            display: none;
        }
        .speaker-A { color: #2980b9; font-weight: bold; }
        .speaker-B { color: #d35400; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="version-badge">버전 1.3 (아이폰 수정완료)</div>
        <h2>음성 녹음 & AI 변환</h2>
        
        <button id="recordBtn">🔴 녹음 시작</button>
        <button id="stopBtn" disabled>⬛ 녹음 중지</button>
        
        <div id="status">대기 중...</div>
        
        <audio id="audioPlayback" controls></audio>

        <button id="analyzeBtn">✨ AI로 화자 분리 및 텍스트 변환</button>
        <div id="transcriptBox" class="transcript-box"></div>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const audioPlayback = document.getElementById('audioPlayback');
        const statusText = document.getElementById('status');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const transcriptBox = document.getElementById('transcriptBox');

        let mediaRecorder;
        let audioChunks = [];
        let currentAudioBlob = null;

        recordBtn.addEventListener('click', async () => {
            try {
                statusText.innerText = "마이크 권한을 요청 중입니다...";
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = []; 

                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    // 아이폰 사파리를 위한 가장 안전한 파일 형식 지정 방식
                    const mimeType = mediaRecorder.mimeType ? mediaRecorder.mimeType : 'audio/mp4';
                    currentAudioBlob = new Blob(audioChunks, { type: mimeType });
                    
                    const audioUrl = URL.createObjectURL(currentAudioBlob);
                    audioPlayback.src = audioUrl;
                    
                    statusText.innerText = "녹음 완료! 이제 AI 분석을 시작할 수 있습니다.";
                    
                    analyzeBtn.style.display = "block";
                    analyzeBtn.disabled = false;
                    transcriptBox.style.display = "none";
                    
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                statusText.innerText = "녹음 중입니다... 아무 말이나 해보세요!";
                statusText.style.color = "#e74c3c";
                recordBtn.disabled = true;
                stopBtn.disabled = false;
                analyzeBtn.style.display = "none";

            } catch (error) {
                console.error("마이크 오류:", error);
                statusText.innerText = "마이크를 사용할 수 없습니다. 권한을 허용해 주세요.";
                statusText.style.color = "#c0392b";
            }
        });

        stopBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                statusText.style.color = "#2c3e50";
                recordBtn.disabled = false;
                stopBtn.disabled = true;
            }
        });

        analyzeBtn.addEventListener('click', () => {
            if (!currentAudioBlob) return;

            statusText.innerText = "AI가 목소리를 구분하고 텍스트로 변환 중입니다... ⏳";
            analyzeBtn.disabled = true;
            transcriptBox.style.display = "block";
            transcriptBox.innerHTML = "<span style='color:#7f8c8d; text-align:center; display:block;'>클라우드 서버로 오디오 전송 중... (약 3초 소요)</span>";

            // 가상 AI 응답 (3초 대기)
            setTimeout(() => {
                const dummyTranscript = `
                    <p><span class="speaker-A">화자 A (팀장):</span> 이번 앱 개발, 어디까지 진행됐나요?</p>
                    <p><span class="speaker-B">화자 B (개발자):</span> 방금 아이폰 사파리 오류를 잡고 2단계 테스트 중입니다.</p>
                    <p><span class="speaker-A">화자 A (팀장):</span> 고생하셨네요! 확인 끝나면 다음 단계로 바로 넘어가시죠.</p>
                `;
                
                transcriptBox.innerHTML = dummyTranscript;
                statusText.innerText = "✨ 텍스트 변환 및 화자 분리 완료!";
                analyzeBtn.disabled = false;
            }, 3000);
        });
    </script>
</body>
</html>
