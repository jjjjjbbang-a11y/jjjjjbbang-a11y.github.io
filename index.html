<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>방준배 과장 AI 비서 v2.3</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #f4f7f6; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        .version { font-size: 12px; color: #e67e22; font-weight: bold; margin-bottom: 10px; }
        .api-input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        #recordBtn { background-color: #e74c3c; }
        #analyzeBtn { background-color: #8e44ad; }
        #resultBox { margin-top: 20px; padding: 15px; background: #fff; border: 1px solid #ddd; border-radius: 5px; white-space: pre-wrap; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="version">버전 2.3 (오류 자동 대응 모드)</div>
        <h2>방준배 과장 (google Gemini)</h2>
        <input type="password" id="apiKey" class="api-input" placeholder="새로 복사한 API 키 입력">
        <button id="recordBtn">🔴 녹음 시작</button>
        <button id="analyzeBtn" style="display:none;">🧠 회의 분석하기</button>
        <div id="resultBox"></div>
    </div>

    <script>
        let mediaRecorder, audioChunks, currentBlob;
        const recordBtn = document.getElementById('recordBtn');
        const analyzeBtn = document.getElementById('analyzeBtn');

        recordBtn.addEventListener('click', async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                currentBlob = new Blob(audioChunks, { type: 'audio/webm' });
                analyzeBtn.style.display = "block";
                stream.getTracks().forEach(t => t.stop());
            };
            mediaRecorder.start();
            recordBtn.innerText = "⬛ 녹음 중 (누르면 정지)";
            recordBtn.onclick = () => mediaRecorder.stop();
        });

        analyzeBtn.addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) { alert("API 키를 확인해주세요!"); return; }
            
            document.getElementById('resultBox').style.display = "block";
            document.getElementById('resultBox').innerText = "분석 중...";
            
            const reader = new FileReader();
            reader.readAsDataURL(currentBlob);
            reader.onloadend = async () => {
                const base64Audio = reader.result.split(',')[1];
                try {
                    // 모델명을 가장 기본으로 되돌렸습니다.
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "이 회의를 요약하고 감정을 분석해줘." }, { inlineData: { mimeType: "audio/webm", data: base64Audio } }] }]
                        })
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    document.getElementById('resultBox').innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, "<br>");
                } catch (e) {
                    document.getElementById('resultBox').innerText = "키 오류: " + e.message + "\n\n팁: 키를 새로 발급받아 다시 붙여넣어 보세요.";
                }
            };
        });
    </script>
</body>
</html>
