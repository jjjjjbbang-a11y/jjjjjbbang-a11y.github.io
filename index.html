<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 회의 분석 앱 v1.4</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-top: 40px; 
            background-color: #f5f7f9; 
            padding-bottom: 50px;
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 320px; 
        }
        .version-badge {
            background-color: #9b59b6;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
            display: inline-block;
        }
        button { 
            padding: 10px 20px; 
            margin: 10px 5px; 
            border: none; 
            border-radius: 6px; 
            font-size: 15px; 
            cursor: pointer; 
            transition: background-color 0.2s; 
        }
        #recordBtn { background-color: #e74c3c; color: white; }
        #recordBtn:disabled { background-color: #f1948a; cursor: not-allowed; }
        
        #stopBtn { background-color: #34495e; color: white; }
        #stopBtn:disabled { background-color: #85929e; cursor: not-allowed; }
        
        #audioPlayback { margin-top: 20px; width: 100%; }
        
        #status { 
            margin-top: 15px; 
            font-weight: bold; 
            color: #2c3e50; 
            font-size: 14px; 
            word-break: keep-all; 
        }

        #analyzeBtn { background-color: #27ae60; color: white; width: 100%; margin-top: 20px; display: none; }
        #analyzeBtn:disabled { background-color: #a9dfbf; cursor: not-allowed; }
        
        /* 3단계 추가: 요약 버튼 및 결과창 스타일 */
        #summarizeBtn { background-color: #8e44ad; color: white; width: 100%; margin-top: 15px; display: none; }
        #summarizeBtn:disabled { background-color: #d2b4de; cursor: not-allowed; }

        .data-box { 
            margin-top: 20px; 
            padding: 15px; 
            background-color: #fdfefe; 
            border: 1px solid #d5dbdb; 
            border-radius: 8px; 
            text-align: left; 
            font-size: 14px; 
            line-height: 1.6; 
            display: none;
        }
        .transcript-box { max-height: 200px; overflow-y: auto; }
        .summary-box { background-color: #f5eef8; border-color: #d7bde2; } /* 요약창은 보라색 톤으로 구분 */
        
        .speaker-A { color: #2980b9; font-weight: bold; }
        .speaker-B { color: #d35400; font-weight: bold; }
        .keyword { font-weight: bold; color: #8e44ad; }
    </style>
</head>
<body>

    <div class="container">
        <div class="version-badge">버전 1.4 (요약 및 감정 분석)</div>
        <h2>AI 회의 비서</h2>
        
        <button id="recordBtn">🔴 녹음 시작</button>
        <button id="stopBtn" disabled>⬛ 녹음 중지</button>
        
        <div id="status">대기 중...</div>
        
        <audio id="audioPlayback" controls></audio>

        <button id="analyzeBtn">✨ AI 텍스트 변환 (STT)</button>
        <div id="transcriptBox" class="data-box transcript-box"></div>

        <button id="summarizeBtn">📝 회의 요약 및 감정 분석</button>
        <div id="summaryBox" class="data-box summary-box"></div>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const audioPlayback = document.getElementById('audioPlayback');
        const statusText = document.getElementById('status');
        
        const analyzeBtn = document.getElementById('analyzeBtn');
        const transcriptBox = document.getElementById('transcriptBox');
        
        // 3단계 버튼과 박스 가져오기
        const summarizeBtn = document.getElementById('summarizeBtn');
        const summaryBox = document.getElementById('summaryBox');

        let mediaRecorder;
        let audioChunks = [];
        let currentAudioBlob = null;
        let generatedText = ""; // LLM에게 넘겨줄 텍스트 데이터 보관용

        // [1단계] 녹음 기능
        recordBtn.addEventListener('click', async () => {
            try {
                statusText.innerText = "마이크 권한 요청 중...";
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = []; 

                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const mimeType = mediaRecorder.mimeType ? mediaRecorder.mimeType : 'audio/mp4';
                    currentAudioBlob = new Blob(audioChunks, { type: mimeType });
                    audioPlayback.src = URL.createObjectURL(currentAudioBlob);
                    
                    statusText.innerText = "녹음 완료!";
                    analyzeBtn.style.display = "block";
                    analyzeBtn.disabled = false;
                    
                    // 새로운 녹음 시 이전 데이터 초기화
                    transcriptBox.style.display = "none";
                    summarizeBtn.style.display = "none";
                    summaryBox.style.display = "none";
                    
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                statusText.innerText = "녹음 중입니다...";
                statusText.style.color = "#e74c3c";
                recordBtn.disabled = true;
                stopBtn.disabled = false;
                analyzeBtn.style.display = "none";

            } catch (error) {
                console.error("마이크 오류:", error);
                statusText.innerText = "마이크 권한을 허용해 주세요.";
                statusText.style.color = "#c0392b";
            }
        });

        stopBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                statusText.style.color = "#2c3e50";
                recordBtn.disabled = false;
                stopBtn.disabled = true;
            }
        });

        // [2단계] STT 변환 기능
        analyzeBtn.addEventListener('click', () => {
            if (!currentAudioBlob) return;

            statusText.innerText = "텍스트 변환 중... ⏳";
            analyzeBtn.disabled = true;
            transcriptBox.style.display = "block";
            transcriptBox.innerHTML = "<span style='color:#7f8c8d;'>음성 인식 중... (약 2초)</span>";

            setTimeout(() => {
                // 가상의 변환된 텍스트
                generatedText = `
                    <p><span class="speaker-A">화자 A (팀장):</span> 이번 앱 개발, 어디까지 진행됐나요?</p>
                    <p><span class="speaker-B">화자 B (개발자):</span> 방금 아이폰 사파리 오류를 잡고 2단계 테스트 중입니다.</p>
                    <p><span class="speaker-A">화자 A (팀장):</span> 고생하셨네요! 확인 끝나면 다음 단계로 바로 넘어가시죠.</p>
                `;
                transcriptBox.innerHTML = generatedText;
                statusText.innerText = "✨ 변환 완료! 이제 요약해 보세요.";
                
                // STT가 끝나면 요약 버튼을 보여줌
                summarizeBtn.style.display = "block";
                summarizeBtn.disabled = false;
            }, 2000);
        });

        // [3단계] 대형 언어 모델(LLM) 요약 및 감정 분석 기능
        summarizeBtn.addEventListener('click', () => {
            statusText.innerText = "AI가 대화의 맥락과 감정을 분석 중입니다... 🧠";
            summarizeBtn.disabled = true;
            summaryBox.style.display = "block";
            summaryBox.innerHTML = "<span style='color:#7f8c8d;'>LLM 서버에서 분석 중... (약 3초)</span>";

            /* [실제 API 연동 시 참고]
            이곳에 위에서 만든 'generatedText'를 ChatGPT API 프롬프트에 넣어서 
            "이 대화를 요약하고 각 화자의 감정을 분석해줘" 라고 요청하는 코드가 들어갑니다.
            */

            setTimeout(() => {
                const dummySummary = `
                    <h3 style="margin-top:0; color:#2c3e50;">📌 회의 요약 노트</h3>
                    <ul style="padding-left: 20px; margin-bottom: 15px;">
                        <li><b>주제:</b> 앱 개발 진행 상황 점검</li>
                        <li><b>현황:</b> 아이폰 브라우저 오류 해결 후 2단계 진행 중</li>
                        <li><b>다음 할 일:</b> 2단계 확인 후 3단계 신속히 착수</li>
                    </ul>
                    
                    <h3 style="margin-top:0; color:#2c3e50;">💡 텍스트 기반 감정/맥락 분석</h3>
                    <p>🧑‍💼 <span class="speaker-A">화자 A (팀장):</span> 상황을 체크하고 있으며, 문제 해결 소식에 <span class="keyword">격려와 긍정적인 반응</span>을 보임. 진행 속도에 만족함.</p>
                    <p>💻 <span class="speaker-B">화자 B (개발자):</span> 오류를 방금 해결하여 성취감이 있으며, <span class="keyword">차분하고 전문적인 태도</span>로 현재 상황을 보고함.</p>
                `;
                
                summaryBox.innerHTML = dummySummary;
                statusText.innerText = "🧠 AI 회의 분석이 모두 완료되었습니다!";
                summarizeBtn.disabled = false;
            }, 3000);
        });
    </script>
</body>
</html>
