<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 비서 v1.0</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h2 {
            color: #333;
            border-bottom: 2px solid #4A90D9;
            padding-bottom: 10px;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        #recordBtn {
            background: #4A90D9;
            color: white;
        }
        #recordBtn.recording {
            background: #E53935;
        }
        #analyzeBtn {
            background: #43A047;
            color: white;
        }
        #analyzeBtn:disabled {
            background: #aaa;
            cursor: not-allowed;
        }
        #statusBox {
            font-size: 13px;
            color: #666;
            margin-top: 12px;
            min-height: 20px;
        }
        #resultBox {
            display: none;
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 16px;
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
            color: #333;
        }
        .result-label {
            font-size: 12px;
            font-weight: bold;
            color: #4A90D9;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <h2>방준배 과장 AI 비서</h2>

    <div class="card">
        <label>Google AI Studio API 키</label>
        <input type="password" id="apiKey" placeholder="API 키를 입력하세요">
    </div>

    <div class="card">
        <div class="btn-row">
            <button id="recordBtn">녹음 시작</button>
            <button id="analyzeBtn" disabled>분석 실행</button>
        </div>
        <div id="statusBox">준비 완료. 녹음 버튼을 눌러 시작하세요.</div>
    </div>

    <div class="card" id="resultCard" style="display:none;">
        <div class="result-label">분석 결과</div>
        <div id="resultBox"></div>
    </div>

    <script>
        let chunks = [];
        let recorder = null;
        let currentBlob = null;
        let isRecording = false;

        const recordBtn = document.getElementById('recordBtn');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const statusBox = document.getElementById('statusBox');
        const resultBox = document.getElementById('resultBox');
        const resultCard = document.getElementById('resultCard');

        recordBtn.onclick = async () => {
            if (!isRecording) {
                // 녹음 시작
                try {
                    chunks = []; // 핵심 수정1: 매번 초기화
                    currentBlob = null;
                    analyzeBtn.disabled = true;

                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                    // 핵심 수정2: mimeType 명시적 지정 (브라우저 호환성)
                    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                        ? 'audio/webm;codecs=opus'
                        : 'audio/webm';

                    recorder = new MediaRecorder(stream, { mimeType });

                    recorder.ondataavailable = (e) => {
                        if (e.data && e.data.size > 0) {
                            chunks.push(e.data);
                        }
                    };

                    recorder.onstop = () => {
                        currentBlob = new Blob(chunks, { type: mimeType });
                        stream.getTracks().forEach(track => track.stop()); // 마이크 해제
                        analyzeBtn.disabled = false;
                        recordBtn.textContent = '녹음 시작';
                        recordBtn.classList.remove('recording');
                        statusBox.textContent = `녹음 완료 (${(currentBlob.size / 1024).toFixed(1)} KB). 분석 버튼을 누르세요.`;
                        isRecording = false;
                    };

                    recorder.start(100); // 100ms 단위로 데이터 수집
                    isRecording = true;
                    recordBtn.textContent = '정지 (녹음 중...)';
                    recordBtn.classList.add('recording');
                    statusBox.textContent = '녹음 중입니다...';

                } catch (err) {
                    statusBox.textContent = '마이크 접근 오류: ' + err.message;
                    console.error(err);
                }
            } else {
                // 녹음 정지
                recorder.stop();
            }
        };

        analyzeBtn.onclick = async () => {
            const apiKey = document.getElementById('apiKey').value.trim();

            // 핵심 수정3: 사전 검증
            if (!apiKey) {
                alert('API 키를 먼저 입력해주세요.');
                return;
            }
            if (!currentBlob) {
                alert('녹음 파일이 없습니다. 먼저 녹음해주세요.');
                return;
            }

            statusBox.textContent = '분석 중입니다... 잠시 기다려주세요.';
            analyzeBtn.disabled = true;
            resultCard.style.display = 'none';

            try {
                const base64 = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(currentBlob);
                    reader.onloadend = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = reject;
                });

                // 핵심 수정4: 모델명 및 mimeType 정확히 지정
                const mimeType = currentBlob.type || 'audio/webm';
                const res = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    {
                                        text: "다음 음성을 한국어로 정확히 텍스트로 변환하고, 요약과 감정 분석을 해줘. 형식: [전체 텍스트]\n[요약]\n[감정 분석]"
                                    },
                                    {
                                        inlineData: {
                                            mimeType: mimeType,
                                            data: base64
                                        }
                                    }
                                ]
                            }]
                        })
                    }
                );

                const data = await res.json();

                // 핵심 수정5: 오류 응답 처리
                if (data.error) {
                    statusBox.textContent = '오류: ' + data.error.message;
                    analyzeBtn.disabled = false;
                    return;
                }

                const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text || '결과를 가져올 수 없습니다.';
                resultBox.textContent = resultText;
                resultCard.style.display = 'block';
                statusBox.textContent = '분석 완료.';

            } catch (err) {
                statusBox.textContent = '오류 발생: ' + err.message;
                console.error(err);
            }

            analyzeBtn.disabled = false;
        };
    </script>
</body>
</html>
