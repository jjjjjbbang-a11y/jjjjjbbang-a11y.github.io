<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 회의 분석 앱 - 녹음 테스트</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 50px; background-color: #f5f7f9; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        button { padding: 10px 20px; margin: 10px 5px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: background-color 0.2s; }
        #recordBtn { background-color: #e74c3c; color: white; }
        #recordBtn:disabled { background-color: #f1948a; cursor: not-allowed; }
        #stopBtn { background-color: #34495e; color: white; }
        #stopBtn:disabled { background-color: #85929e; cursor: not-allowed; }
        #audioPlayback { margin-top: 20px; width: 100%; }
        #status { margin-top: 15px; font-weight: bold; color: #2c3e50; font-size: 14px; word-break: keep-all; }
    </style>
</head>
<body>

    <div class="container">
        <h2>음성 녹음 테스트</h2>
        <button id="recordBtn">🔴 녹음 시작</button>
        <button id="stopBtn" disabled>⬛ 녹음 중지</button>
        
        <div id="status">대기 중...</div>
        
        <audio id="audioPlayback" controls></audio>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const audioPlayback = document.getElementById('audioPlayback');
        const statusText = document.getElementById('status');

        let mediaRecorder;
        let audioChunks = [];

        // 녹음 시작 버튼을 눌렀을 때만 마이크 권한을 요청하도록 변경
        recordBtn.addEventListener('click', async () => {
            try {
                statusText.innerText = "마이크 권한을 요청 중입니다...";
                
                // 1. 버튼을 클릭한 순간 마이크 권한 요청
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // 2. 녹음기 세팅
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = []; // 배열 초기화

                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audioPlayback.src = audioUrl;
                    
                    statusText.innerText = "녹음 완료! 재생해 보세요.";
                    
                    // 브라우저 탭에 떠있는 빨간 녹음 아이콘(마이크 사용 중)을 확실히 꺼주는 코드
                    stream.getTracks().forEach(track => track.stop());
                };

                // 3. 세팅이 끝나면 바로 녹음 시작
                mediaRecorder.start();
                statusText.innerText = "녹음 중입니다...";
                statusText.style.color = "#e74c3c";
                recordBtn.disabled = true;
                stopBtn.disabled = false;

            } catch (error) {
                console.error("마이크 오류:", error);
                // 모바일이나 특정 브라우저에서 권한이 거부되었을 때의 안내 문구
                statusText.innerText = "마이크를 사용할 수 없습니다. 주소창 왼쪽의 자물쇠 아이콘을 눌러 권한을 허용해 주세요.";
                statusText.style.color = "#c0392b";
            }
        });

        stopBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                statusText.style.color = "#2c3e50";
                recordBtn.disabled = false;
                stopBtn.disabled = true;
            }
        });
    </script>
</body>
</html>
