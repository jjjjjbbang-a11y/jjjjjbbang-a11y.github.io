<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 비서 v2.4 (최후의 수단)</title>
</head>
<body>
    <h2>방준배 과장 AI 비서 (로컬 모드)</h2>
    <input type="password" id="apiKey" placeholder="API 키 입력">
    <button id="recordBtn">녹음 시작</button>
    <button id="analyzeBtn">분석 실행</button>
    <div id="resultBox"></div>
    <script>
        let chunks = [];
        let recorder;
        recordBtn.onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({audio: true});
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                window.currentBlob = new Blob(chunks, {type: 'audio/webm'});
                alert("녹음 완료! 이제 분석 버튼을 누르세요.");
            };
            recorder.start();
            recordBtn.innerText = "녹음 중... (누르면 정지)";
            recordBtn.onclick = () => recorder.stop();
        };
        analyzeBtn.onclick = async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const reader = new FileReader();
            reader.readAsDataURL(window.currentBlob);
            reader.onloadend = async () => {
                const base64 = reader.result.split(',')[1];
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({contents: [{parts: [{text: "요약과 감정 분석을 해줘."}, {inlineData: {mimeType: "audio/webm", data: base64}}]}]})
                });
                const data = await res.json();
                document.getElementById('resultBox').innerText = data.candidates[0].content.parts[0].text;
            };
        };
    </script>
</body>
</html>
